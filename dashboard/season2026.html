<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NFL 2026 — Research Dashboard</title>
<style>
  :root{
    --bg:#0b1120; --panel:#131c2e; --panel2:#1b263f; --line:#26324d;
    --txt:#e8edf7; --muted:#8ea0c0; --accent:#3b82f6; --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--txt);}
  a{color:var(--accent);text-decoration:none}
  header{padding:16px 26px 0;border-bottom:1px solid var(--line)}
  .htop{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{font-size:20px;margin:0;letter-spacing:.3px}
  header .tag{color:var(--muted);font-size:13px}
  nav{display:flex;gap:4px;margin-top:12px;flex-wrap:wrap}
  nav a{padding:9px 15px;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;font-weight:600}
  nav a.active{color:var(--txt);border-bottom-color:var(--accent)}
  nav a:hover{color:var(--txt)}
  .note{background:#1a2338;border:1px solid var(--line);color:var(--muted);
        font-size:12.5px;padding:8px 14px;border-radius:8px;margin:14px 26px}
  .note.warn{border-color:#4a3a12;background:#241d0e;color:#e5c98a}
  .wrap{display:grid;grid-template-columns:minmax(340px,1fr) minmax(360px,1.1fr);
        gap:20px;padding:16px 26px 40px}
  @media(max-width:840px){.wrap{grid-template-columns:1fr}}
  .pad{padding:16px 26px 40px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:20px}
  .card h2{margin:0 0 14px;font-size:15px;font-weight:600;color:var(--txt)}
  .card h2 span{color:var(--muted);font-weight:400;font-size:12px;margin-left:6px}
  .row{display:flex;gap:20px;flex-wrap:wrap}
  .row>.card{flex:1;min-width:300px;margin-bottom:0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:840px){.grid2{grid-template-columns:1fr}}
  select{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
         border-radius:9px;padding:10px;font-size:14px}
  /* page header with a team picker (Team + Trends views) */
  .viewhead{display:flex;align-items:center;justify-content:space-between;gap:12px;
            flex-wrap:wrap;margin-bottom:18px}
  .viewhead .ttl{font-size:18px;font-weight:700}
  .viewhead .ttl span{color:var(--muted);font-weight:400;font-size:12px;margin-left:6px}
  select.pick{width:auto;max-width:260px;min-width:190px}
  @media(max-width:560px){.viewhead{flex-direction:column;align-items:stretch}
    select.pick{max-width:none;width:100%}}
  button{background:var(--accent);color:#fff;border:0;border-radius:9px;padding:11px 16px;
         font-size:14px;font-weight:600;cursor:pointer;width:100%}
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.5;cursor:default}
  .loading{color:var(--muted);font-size:13px;padding:10px 0}

  /* rankings */
  .rk{display:flex;align-items:center;gap:10px;padding:6px 4px;border-bottom:1px solid #1c2740;cursor:pointer}
  .rk:last-child{border:0}
  .rk .n{width:24px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:13px}
  .rk img{width:26px;height:26px;object-fit:contain}
  .rk .tm{width:118px;display:flex;flex-direction:column;line-height:1.15}
  .rk .ab{font-weight:600;font-size:13px}
  .rk .qb{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rk .barwrap{flex:1;height:16px;background:#0e1626;border-radius:6px;position:relative;overflow:hidden}
  .rk .barwrap .zero{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#3a4a68;z-index:1}
  .rk .bar{position:absolute;top:2px;bottom:2px}
  .rk .bar.pos{left:50%;border-radius:0 4px 4px 0}   /* above-average teams extend right */
  .rk .bar.neg{right:50%;border-radius:4px 0 0 4px}  /* below-average teams extend left  */
  .rk .val{width:46px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px}

  /* chips + tiles */
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 11px;font-size:11.5px;color:var(--txt)}
  .chip.lbl{background:#16233b;border-color:#2a3b5c}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .tile{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .tile .k{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
  .tile .v{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px}

  /* strength/weakness bars */
  .swrow{display:grid;grid-template-columns:130px 1fr 34px;align-items:center;gap:8px;margin:6px 0;font-size:12px}
  .swrow .lb{color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .swrow .bw{height:9px;background:#0e1626;border-radius:5px;overflow:hidden}
  .swrow .bw i{display:block;height:100%;border-radius:5px}
  .swrow .pv{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}

  /* team profile header */
  .thead{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .thead img{width:56px;height:56px;object-fit:contain}
  .thead .nm{font-size:22px;font-weight:700}
  .thead .sub{color:var(--muted);font-size:13px}
  .thead .rt{margin-left:auto;text-align:right}
  .thead .rt .big{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums}
  .thead .rt .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}

  /* unit bars (single team) */
  .ubar{display:grid;grid-template-columns:80px 1fr 42px;align-items:center;gap:8px;margin:5px 0;font-size:12px}
  .ubar .lb{color:var(--muted)}
  .ubar .bw{height:9px;background:#0e1626;border-radius:5px;position:relative;overflow:hidden}
  .ubar .bw .mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#33415f}
  .ubar .bw i{position:absolute;top:0;bottom:0;border-radius:5px}
  .ubar .pv{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}

  /* depth chart */
  .depth{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .grp{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
  .grp .gh{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
  .pl{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
  .pl .dr{width:26px;color:var(--muted);font-size:10px;text-align:right}
  .pl .pn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl.starter .pn{font-weight:600}
  .pl .rt{width:30px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;font-size:12px}
  .pl .rb{width:44px;height:6px;border-radius:3px;background:#0e1626;overflow:hidden}
  .pl .rb i{display:block;height:100%;border-radius:3px}

  /* matchup */
  .selrow{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:14px}
  .at{color:var(--muted);font-size:12px}
  .opts{display:flex;gap:8px;align-items:center;margin:10px 0 4px;color:var(--muted);font-size:12.5px}
  .result{margin-top:18px;display:none}
  .score{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;text-align:center}
  .score .tm{display:flex;flex-direction:column;align-items:center;gap:6px}
  .score img{width:52px;height:52px;object-fit:contain}
  .score .pts{font-size:34px;font-weight:700;font-variant-numeric:tabular-nums}
  .score .ab{font-size:13px;color:var(--muted)}
  .score .vs{color:var(--muted);font-size:12px}
  .prob{margin-top:16px}
  .probbar{height:26px;border-radius:8px;overflow:hidden;display:flex;font-size:12px;font-weight:600}
  .probbar .h{background:var(--accent);display:flex;align-items:center;padding-left:10px}
  .probbar .a{background:#475569;display:flex;align-items:center;justify-content:flex-end;padding-right:10px}
  .meta{display:flex;justify-content:space-around;margin-top:16px;text-align:center}
  .meta div .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .meta div .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
  .units{margin-top:0}
  .uh{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;text-align:center}
  .ur{display:grid;grid-template-columns:34px 1fr 88px 1fr 34px;align-items:center;gap:6px;margin:5px 0;font-size:11px}
  .ur .uv{font-variant-numeric:tabular-nums;color:var(--muted)}
  .ur .ul{text-align:center;color:var(--txt);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px}
  .ur .ub{height:8px;background:#0e1626;border-radius:4px;position:relative;overflow:hidden}
  .ur .ub i{position:absolute;top:0;bottom:0;border-radius:4px}
  .ur .ba i{right:0}
  .ur .bh i{left:0}
  .box{margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:520px){.box{grid-template-columns:1fr}}
  .bxt .bh{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .bxt .bh img{width:18px;height:18px;object-fit:contain}
  .bxs{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:8px 0 3px}
  .bxr{display:flex;justify-content:space-between;font-size:11.5px;padding:2px 0;gap:6px}
  .bxr .bn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bxr .bs{color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}

  /* injuries */
  .inj{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #1c2740;gap:8px}
  .inj:last-child{border:0}
  .inj .st{font-weight:700;font-size:10.5px;padding:1px 7px;border-radius:20px}
  .st-Out{background:#3a1414;color:#f87171}
  .st-Doubtful{background:#3a2a12;color:#fbbf24}
  .st-Questionable{background:#20304a;color:#93c5fd}

  /* schedule slate */
  .sched{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer}
  .gcard:hover{border-color:var(--accent)}
  .gc-tms{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .gc-tm{display:flex;flex-direction:column;align-items:center;gap:4px}
  .gc-tm img{width:34px;height:34px;object-fit:contain}
  .gc-ab{font-weight:700;font-size:13px}
  .gc-sc{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
  .gc-mid{color:var(--muted);font-size:12px;text-align:center}
  .gc-prob{height:6px;border-radius:3px;overflow:hidden;display:flex;margin:10px 0 8px}
  .gc-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);padding:2px 0}
  .gc-row b{color:var(--txt);font-weight:600}
  .gc-final{font-size:11.5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--line);color:var(--muted)}
  .gc-ctx{font-size:10.5px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--line);line-height:1.45}
  .gcard.top{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;position:relative}
  .gc-badge{position:absolute;top:-9px;left:12px;background:var(--accent);color:#fff;font-size:10.5px;
            font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.2px}
  .gc-edge{background:#12233f;border:1px solid #26406b;border-radius:8px;padding:6px 10px;margin:8px 0 2px;
           font-size:11.5px;display:flex;justify-content:space-between;align-items:center}
  .gc-edge b{color:#8fc0ff}
  .toppicks{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 4px}
  .tp{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid #2a3b5c;
      border-radius:20px;padding:5px 12px 5px 6px;font-size:12px;cursor:pointer}
  .tp:hover{border-color:var(--accent)}
  .tp .rk{background:var(--accent);color:#fff;width:19px;height:19px;border-radius:50%;display:inline-flex;
          align-items:center;justify-content:center;font-size:10.5px;font-weight:700;flex:0 0 auto}

  /* refresh */
  .rfstat{font-size:13px;color:var(--muted);margin-top:12px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  svg text{fill:var(--muted)}

  /* ── fantasy board ── */
  .segbar{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .segbar button{width:auto;background:transparent;color:var(--muted);padding:7px 14px;font-size:13px;border-radius:7px}
  .segbar button.on{background:var(--accent);color:#fff}
  .posfil{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
  .posfil .pf{padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel2);
              color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer}
  .posfil .pf.on{background:#16233b;border-color:var(--accent);color:var(--txt)}
  .ftbl{width:100%;border-collapse:collapse;font-size:13px}
  .ftbl th{text-align:left;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
           padding:8px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
  .ftbl th.r,.ftbl td.r{text-align:right;font-variant-numeric:tabular-nums}
  .ftbl td{padding:8px 10px;border-bottom:1px solid #1a2334}
  .ftbl tr:hover td{background:#161f33}
  .ftbl .pos{display:inline-block;min-width:34px;text-align:center;font-size:10.5px;font-weight:700;
             padding:2px 6px;border-radius:5px}
  .pos-QB{background:#2a1836;color:#d6a8ff}.pos-RB{background:#0f2a1c;color:#7fe3ad}
  .pos-WR{background:#13233f;color:#8fc0ff}.pos-TE{background:#33260f;color:#f0c079}
  .ftbl .pr{color:var(--muted);font-size:11px}
  .ftbl .nm{font-weight:600}
  .tier{display:inline-block;background:#1b2c4a;border:1px solid #2f4a78;color:#9fc2ff;
        font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px}
  /* draft-path config bar */
  .cfgbar{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px}
  .cfgk{display:block;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .rosgrid{display:flex;gap:8px;flex-wrap:wrap}
  .ros{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px 7px}
  .ros .rlbl{font-size:11px;font-weight:700;color:var(--muted);min-width:30px}
  .ros button{width:24px;height:24px;padding:0;background:#1b2c4a;color:#cfe0ff;border:1px solid #2f4a78;border-radius:6px;font-size:16px;line-height:1;cursor:pointer}
  .ros button:hover{border-color:var(--accent)}
  .ros .rn{width:18px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums}
  /* player props */
  .pptbl{width:100%;border-collapse:collapse;font-size:13px}
  .pptbl th{text-align:left;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding:7px 9px;border-bottom:1px solid var(--line)}
  .pptbl th.r,.pptbl td.r{text-align:right;font-variant-numeric:tabular-nums}
  .pptbl th.c,.pptbl td.c{text-align:center}
  .pptbl td{padding:6px 9px;border-bottom:1px solid #1a2334}
  .pptbl tr:hover td{background:#161f33}
  .pptbl .plr{font-weight:700}
  .pptbl .mk{color:var(--muted)}
  .ppline{width:62px;background:var(--panel);color:var(--txt);border:1px solid #2f4a78;border-radius:6px;
          padding:5px 7px;font-size:12.5px;text-align:right;font-variant-numeric:tabular-nums}
  .ppov{font-weight:700}.ppun{color:var(--muted)}
  .ppodds{font-variant-numeric:tabular-nums;color:#9fc2ff;font-weight:600}
  .ppbadge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:6px}
  .ppbadge.lean-o{background:#0f2a1c;color:#7fe3ad}.ppbadge.lean-u{background:#2a1620;color:#f2a1bb}
  .ppbadge.lean-n{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .val-pos{color:var(--good);font-weight:700}.val-neg{color:var(--bad);font-weight:700}
  .ftgap{height:8px;background:#0e1626;border-radius:4px;overflow:hidden;min-width:60px}
  .ftgap i{display:block;height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e)}

  /* ── polish: consistent capitalization + clearer emphasis ── */
  .cap{text-transform:capitalize}
  /* offense/defense scheme labels rendered as colored pills (not run-on muted text) */
  .labs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .lab{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;letter-spacing:.2px;text-transform:capitalize}
  .lab .t{opacity:.62;text-transform:uppercase;font-size:9px;letter-spacing:.5px;margin-right:5px;font-weight:700}
  .lab.off{background:#0f2419;color:#7fe3ad;border:1px solid #1f5137}
  .lab.def{background:#281420;color:#f2a1bb;border:1px solid #5a2438}
  .lab.neu{background:var(--panel2);color:var(--txt);border:1px solid var(--line);text-transform:none}
  /* rating block in the team header — make the headline number pop */
  .thead .rt{margin-left:auto;text-align:center;background:var(--panel2);border:1px solid var(--line);
             border-radius:12px;padding:9px 18px;min-width:100px}
  .thead .rt .big{font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .thead .rt .k{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px}
  .thead .rt .k.top{margin-bottom:4px}
  .qbline{color:var(--txt);font-size:13px;margin-top:5px}
  .qbline .qbk{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-right:5px}
  /* scheme-tag chips: uniform look regardless of source casing */
  .chip.tag{text-transform:capitalize;background:#16233b;border-color:#2a3b5c;color:#cfe0ff}
  /* matchup hero: dominant score + spread, everything else secondary */
  .mhero{background:linear-gradient(180deg,var(--panel2) 0,var(--panel) 100%);}
  .spreadpill{display:inline-flex;align-items:center;gap:7px;background:#12233f;border:1px solid #2f4a78;
              color:#9fcaff;font-weight:700;font-size:14px;padding:7px 16px;border-radius:22px}
  .spreadpill .sk{color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .herometa{display:flex;justify-content:center;gap:26px;margin-top:16px;flex-wrap:wrap}
  .herometa .hm{text-align:center}
  .herometa .hm .k{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .herometa .hm .v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>🏈 NFL 2026</h1>
    <span class="tag">Research dashboard — power ratings · team profiles · trends · matchups</span>
  </div>
  <nav id="nav">
    <a href="#/rankings">Rankings</a>
    <a href="#/schedule">Schedule</a>
    <a href="#/team">Team</a>
    <a href="#/trends">Trends</a>
    <a href="#/matchup">Matchup</a>
    <a href="#/fantasy">Fantasy</a>
    <a href="#/props">Props</a>
    <a href="#/refresh">Refresh</a>
  </nav>
</header>

<div id="app"><div class="loading pad">Loading…</div></div>

<script>
const SEASON = 2025;               // latest completed season = "entering 2026"
let META = {};                     // team -> {rank,rating,name,color,logo,qb,...}
let TEAMS = [];                    // sorted [{team,name}]
let RANKINGS = null;               // cached power_rankings response

async function j(u){ const r = await fetch(u); if(!r.ok && r.status>=500) throw new Error(u); return r.json(); }
const app = () => document.getElementById('app');
const esc = s => (s==null?'':String(s));
const f1 = x => x==null? '—' : (x>0?'+':'') + Number(x).toFixed(1);
const f2 = x => x==null? '—' : (x>0?'+':'') + Number(x).toFixed(2);
const pc = x => x==null? '—' : Math.round(Number(x)*100) + '%';
// tidy a data-driven label: fix the missing-apostrophe style label, trim. Casing is handled
// in CSS via .cap so "spread", "West Coast", "aggressive blitz" all render uniformly.
const nlbl = s => (s==null||s==='')? '' : String(s).replace(/\bDont\b/g,"Don't").trim();

function ratingColor(r){ if(r==null) return '#3a465e'; const h=Math.round(r*1.2); return `hsl(${h},60%,50%)`; }
function pctlColor(p){ const h=Math.round(p*1.2); return `hsl(${h},62%,48%)`; }
function zColor(z){ const c=Math.max(-2,Math.min(2,z||0)); const h=Math.round((c+2)/4*120); return `hsl(${h},60%,50%)`; }

// ── data bootstrap ──────────────────────────────────────────────────
async function ensureRankings(){
  if(RANKINGS) return RANKINGS;
  RANKINGS = await j(`/api/power_rankings?season=${SEASON}`);
  RANKINGS.forEach(d => META[d.team] = d);
  TEAMS = [...RANKINGS].sort((a,b)=>a.team.localeCompare(b.team)).map(d=>({team:d.team,name:d.name}));
  return RANKINGS;
}
function teamOptions(sel){ return TEAMS.map(t=>`<option value="${t.team}" ${t.team===sel?'selected':''}>${t.team} — ${t.name}</option>`).join(''); }

// ── inline SVG line chart ───────────────────────────────────────────
// series: [{name,color,vals:[nullable numbers]}]  labels: week numbers
function svgLines(labels, series, opts={}){
  const W=opts.w||560, H=opts.h||180, pL=34, pR=10, pT=14, pB=22;
  const xs = labels.length;
  if(!xs) return '<div class="loading">No data.</div>';
  let lo=Infinity, hi=-Infinity;
  series.forEach(s=>s.vals.forEach(v=>{ if(v!=null){ lo=Math.min(lo,v); hi=Math.max(hi,v);} }));
  if(!isFinite(lo)){ lo=0; hi=1; }
  if(opts.zero){ lo=Math.min(lo,0); hi=Math.max(hi,0); }
  if(lo===hi){ hi=lo+1; }
  const pad=(hi-lo)*0.1; lo-=pad; hi+=pad;
  const X = i => pL + (xs<=1?0:(i/(xs-1))*(W-pL-pR));
  const Y = v => H-pB - ((v-lo)/(hi-lo))*(H-pT-pB);
  let g = `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">`;
  // zero baseline
  if(lo<0 && hi>0){ const y=Y(0); g+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#2a3b5c" stroke-dasharray="3 3"/>`; }
  // y ticks (lo, mid, hi)
  [lo,(lo+hi)/2,hi].forEach(v=>{ const y=Y(v); g+=`<text x="2" y="${y+3}" font-size="9">${v.toFixed(2)}</text>`; });
  // x labels (every ~3rd week)
  labels.forEach((w,i)=>{ if(i%3===0||i===xs-1){ g+=`<text x="${X(i)-4}" y="${H-6}" font-size="9">${w}</text>`; }});
  series.forEach(s=>{
    let d='', started=false;
    s.vals.forEach((v,i)=>{ if(v==null){started=false;return;} d+=(started?'L':'M')+X(i)+' '+Y(v)+' '; started=true; });
    g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>`;
    s.vals.forEach((v,i)=>{ if(v!=null) g+=`<circle cx="${X(i)}" cy="${Y(v)}" r="2.2" fill="${s.color}"/>`; });
  });
  g+='</svg>';
  const leg = series.map(s=>`<span class="chip"><span class="dot" style="background:${s.color}"></span>${s.name}</span>`).join(' ');
  return `<div style="margin-bottom:8px" class="chips">${leg}</div>${g}`;
}

// ── router ──────────────────────────────────────────────────────────
function parseHash(){
  const h = location.hash.replace(/^#\/?/,'');           // e.g. team/KC  or matchup?home=KC&away=BAL
  const [path, qs] = h.split('?');
  const parts = path.split('/').filter(Boolean);
  const params = new URLSearchParams(qs||'');
  return { view: parts[0]||'rankings', arg: parts[1], params };
}
function setActiveNav(view){
  document.querySelectorAll('#nav a').forEach(a=>{
    a.classList.toggle('active', a.getAttribute('href')===`#/${view}`);
  });
}
async function route(){
  const {view, arg, params} = parseHash();
  setActiveNav(view);
  try{
    await ensureRankings();
    if(view==='rankings')      await viewRankings();
    else if(view==='schedule') await viewSchedule(params);
    else if(view==='team')     await viewTeam(arg || TEAMS[0].team);
    else if(view==='trends')   await viewTrends(arg || (RANKINGS[0]&&RANKINGS[0].team));
    else if(view==='matchup')  await viewMatchup(params.get('home'), params.get('away'), params.get('neutral')==='1');
    else if(view==='fantasy')  await viewFantasy(params);
    else if(view==='props')    await viewProps(params);
    else if(view==='refresh')  await viewRefresh();
    else                       await viewRankings();
  }catch(e){ app().innerHTML = `<div class="note warn pad">Something went wrong loading this view: ${esc(e.message)}</div>`; }
}
function go(hash){ location.hash = hash; }

// ── VIEW: rankings ──────────────────────────────────────────────────
async function viewRankings(){
  const data = RANKINGS;
  const max = Math.max(...data.map(d=>Math.abs(d.rating)),1);
  app().innerHTML = `
    <div class="note"><b>2026 roster-talent ranking</b> — rates each team by the players currently
      on its roster (QB by multi-year EPA, skill/OL/pass-rush/coverage) + coaching, <b>not</b> by last
      year's results. Click a team for its full profile.</div>
    <div class="pad"><div class="card"><h2>Power Rankings <span>2026 · roster talent · bar diverges from league average</span></h2>
      ${data.map(d=>{
        const w=Math.max(1.5,Math.abs(d.rating)/max*49);   // each side spans up to ~half the track
        const pos=d.rating>=0;
        const prev=(d.prev!=null)?`2025: ${f1(d.prev)}`:'';
        return `<div class="rk" title="${prev}" onclick="go('#/team/${d.team}')">
          <div class="n">${d.rank}</div>
          <img src="${d.logo}" onerror="this.style.visibility='hidden'">
          <div class="tm"><div class="ab">${d.team}</div>${d.qb?`<div class="qb">${d.qb}</div>`:''}</div>
          <div class="barwrap"><span class="zero"></span><div class="bar ${pos?'pos':'neg'}" style="width:${w}%;background:${d.color}"></div></div>
          <div class="val" style="color:${pos?'var(--good)':'var(--bad)'}">${f1(d.rating)}</div>
        </div>`;
      }).join('')}
    </div></div>`;
}

async function viewTrends(team){
  team = team || TEAMS[0].team;
  app().innerHTML = `<div class="pad">
    <div class="viewhead">
      <div class="ttl">Team Trends <span>weekly form</span></div>
      <select id="trPick" class="pick">${teamOptions(team)}</select>
    </div>
    <div class="card">
      <div id="trBody"><div class="loading">Loading…</div></div>
    </div></div>`;
  document.getElementById('trPick').addEventListener('change', e=>go('#/trends/'+e.target.value));
  const d = await j(`/api/team_trends?team=${team}`);
  const body = document.getElementById('trBody');
  if(d.empty || !d.weeks.length){
    body.innerHTML = `<div class="note warn">No play-by-play for ${esc(team)} yet — the ${d.season} season hasn't produced games. Weekly trends appear once the season kicks off.</div>`;
    return;
  }
  const labels = d.weeks.map(w=>w.week);
  const epaChart = svgLines(labels, [
    {name:'Offense EPA/play', color:'#22c55e', vals:d.weeks.map(w=>w.off_epa)},
    {name:'Defense EPA/play (allowed)', color:'#ef4444', vals:d.weeks.map(w=>w.def_epa)},
  ], {zero:true});
  const ptsChart = svgLines(labels, [
    {name:'Points for', color:'#3b82f6', vals:d.weeks.map(w=>w.pf)},
    {name:'Points against', color:'#f59e0b', vals:d.weeks.map(w=>w.pa)},
  ], {});
  const S=d.summary||{}, s=S.season||{}, l=S.last3||{};
  const cmp=(a,b,inv)=>{ if(a==null||b==null) return ''; const up=inv? a<b : a>b; return `<span style="color:${up?'var(--good)':'var(--bad)'}">${up?'▲':'▼'}</span>`; };
  body.innerHTML = `
    <div class="note">Season ${d.season} · ${S.games} games. Last-3-week form vs season average below.</div>
    <div class="tiles" style="margin-bottom:16px">
      <div class="tile"><div class="k">Off EPA (last 3)</div><div class="v">${f2(l.off_epa)} ${cmp(l.off_epa,s.off_epa)}</div></div>
      <div class="tile"><div class="k">Def EPA (last 3)</div><div class="v">${f2(l.def_epa)} ${cmp(l.def_epa,s.def_epa,true)}</div></div>
      <div class="tile"><div class="k">Pts for (last 3)</div><div class="v">${l.pf!=null?Number(l.pf).toFixed(1):'—'} ${cmp(l.pf,s.pf)}</div></div>
      <div class="tile"><div class="k">Pts against (last 3)</div><div class="v">${l.pa!=null?Number(l.pa).toFixed(1):'—'} ${cmp(l.pa,s.pa,true)}</div></div>
    </div>
    <div class="grid2">
      <div><div class="bxs">EPA per play by week</div>${epaChart}</div>
      <div><div class="bxs">Points for / against by week</div>${ptsChart}</div>
    </div>`;
}

function renderUnits(r){
  if(!r.units || !r.units[r.away]) return '';
  const aw=r.units[r.away], hm=r.units[r.home], ac=r.away_color, hc=r.home_color;
  const w = z => Math.max(3, Math.min(100,(z+2)/4*100));
  return `<div class="units"><div class="uh">${r.away} &nbsp;vs&nbsp; ${r.home} — unit ratings (league z-score)</div>`+
    UNIT_ROWS.map(([k,lbl])=>{ const az=aw[k]??0,hz=hm[k]??0;
      return `<div class="ur"><div class="uv" style="text-align:right">${f1(az)}</div>
        <div class="ub ba"><i style="width:${w(az)}%;background:${ac}"></i></div>
        <div class="ul">${lbl}</div>
        <div class="ub bh"><i style="width:${w(hz)}%;background:${hc}"></i></div>
        <div class="uv">${f1(hz)}</div></div>`;
    }).join('')+`</div>`;
}

function matchupEdges(r){
  const sm=r.scheme_matchup, ui=r.unit_injuries||{};
  const UNIT={z_off_pass:'pass offense',z_off_rush:'rush offense',z_def_pass:'pass defense',z_def_rush:'run defense'};
  const scheme=[], unit=[];
  for(const t of [r.away,r.home]){
    const ns=(sm&&sm.notes&&sm.notes[t])||[];
    if(ns.length) scheme.push(`<b>${t}</b> — ${ns.map(esc).join(' · ')}`);
    const d=ui[t]||{}, ks=Object.keys(d);
    if(ks.length) unit.push(`<b>${t}</b> injuries weaken: ${ks.map(k=>UNIT[k]||k).join(', ')}`);
  }
  if(!scheme.length && !unit.length) return '';
  return `<div class="card"><h2>Scheme &amp; injury edges <span>play-caller matchups + injury-to-unit</span></h2>
    ${scheme.length?`<div class="bxs">Scheme matchups (offensive scheme vs defensive scheme)</div>${scheme.map(p=>`<div style="font-size:12px;padding:3px 0">${p}</div>`).join('')}`:''}

  </div>`;
}
function simPanel(r){
  const s=r.simulation; if(!s) return '';
  const km=s.key_margins||{};
  const rows=[3,7,6,10,14,4].map(k=>{const p=(km[k]||0)*100;const w=Math.min(100,p*5);
    return `<div class="swrow"><div class="lb">Margin = ${k}</div><div class="bw"><i style="width:${Math.max(2,w)}%;background:#8fc0ff"></i></div><div class="pv">${p.toFixed(1)}%</div></div>`;}).join('');
  return `<div class="card"><h2>Simulation <span>empirical outcome distribution over every past NFL game</span></h2>

function injImpactNote(r){
  const ii=r.injury_impact; if(!ii) return '';
  const side=t=>{ const d=ii[t]; if(!d||!d.pts) return ''; return `<b>${t}</b> −${d.pts} pts${d.players&&d.players.length?` (${d.players.map(esc).join(', ')})`:''}`; };
  const parts=[side(r.away),side(r.home)].filter(Boolean);
  if(!parts.length) return `<div class="note">No ruled-out players affect this matchup.</div>`;
  return `<div class="note warn">Spread adjusted for absences — ${parts.join(' · ')}</div>`;
}
function boxTeam(tm, t){
  if(!t) return '';
  const m=META[tm]||{}; const rbs=(t.rush||[]); const wrs=(t.rec||[]).filter(x=>x.pos!=='RB'); const q=t.qb;

  if(rbs.length){ h+=`<div class="bxs">Rushing</div>`+rbs.map(x=>`<div class="bxr"><span class="bn">${x.name}</span><span class="bs">${x.carries} car, ${x.rush_yds} yd, ${x.rush_td} TD</span></div>`).join(''); }
  const recAll=[...rbs.filter(x=>x.rec>0).map(x=>({name:x.name,rec:x.rec,targets:x.targets,rec_yds:x.rec_yds,rec_td:x.rec_td||0})),...wrs];
  if(recAll.length){ h+=`<div class="bxs">Receiving</div>`+recAll.map(x=>`<div class="bxr"><span class="bn">${x.name}</span><span class="bs">${x.rec}/${x.targets}, ${x.rec_yds} yd, ${x.rec_td} TD</span></div>`).join(''); }
  return h+`</div>`;
}

function ftPosFilter(pos,sc){

let FT_PATH = {};
const FT_ROS = [['qb','QB'],['rb','RB'],['wr','WR'],['te','TE'],['k','K'],['dst','DST']];
function ftPathGo(o){
  const p = {...FT_PATH, ...o};
  if(p.scoring==='bestball'){ p.k='0'; p.dst='0'; }   // Best Ball has no kickers/defenses
  const t = parseInt(p.teams)||12; let s = parseInt(p.slot)||1; s = Math.max(1, Math.min(t, s)); p.slot = ''+s;

function ftStep(key,delta){ const cur=parseInt(FT_PATH[key]||'0')||0; ftPathGo({[key]: Math.max(0,Math.min(15,cur+delta))}); }
function ftPathConfig(){
  const P=FT_PATH, t=parseInt(P.teams)||12, sizes=[8,10,12,14];

function ftPath(d){

// ── VIEW: player props ──────────────────────────────────────────────
let PP_ROWS = [];
function ppErf(x){ const t=1/(1+0.3275911*Math.abs(x));
  const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
  return x>=0?y:-y; }
function ppNormCdf(z){ return 0.5*(1+ppErf(z/Math.SQRT2)); }
function ppPoisCdf(k,lam){ if(k<0)return 0; let s=0,term=Math.exp(-lam); for(let i=0;i<=k;i++){ if(i>0)term*=lam/i; s+=term;} return Math.min(1,s); }
function ppOver(m,line){
  if(m.dist==='prob') return {over:m.proj,push:0};
  if(m.dist==='normal'){ return {over:1-ppNormCdf((line-m.proj)/Math.max(1e-6,m.sd)),push:0}; }
  const lam=m.lam, isInt=Math.abs(line-Math.round(line))<1e-9;
  if(isInt){ let push=Math.exp(-lam); for(let i=1;i<=line;i++)push*=lam/i; return {over:1-ppPoisCdf(line,lam),push}; }
  return {over:1-ppPoisCdf(Math.floor(line),lam),push:0};
}
function ppFair(p){ p=Math.min(0.999,Math.max(0.001,p)); return p>=0.5?Math.round(-100*p/(1-p)):Math.round(100*(1-p)/p); }
function ppUpdate(i){
  const m=PP_ROWS[i];
  let line=0.5;                                    // anytime-TD rows have no input; line is ignored
  if(m.dist!=='prob'){ const inp=document.querySelector(`.ppline[data-i="${i}"]`); if(!inp) return; line=parseFloat(inp.value); if(isNaN(line)) return; }
  const r=ppOver(m,line), push=r.push||0, un=Math.max(0,1-r.over-push);
  const cell=document.getElementById('pp-'+i);
  if(m.dist==='prob'){ cell.innerHTML=`<span class="ppbadge lean-o">${Math.round(r.over*100)}% to score</span> <span class="ppodds">${ppFair(r.over)>0?'+':''}${ppFair(r.over)}</span>`; return; }
  const op=Math.round(r.over*100), up=Math.round(un*100), overSide=op>=up, prob=overSide?r.over:un;
  const neutral=op===up;
  cell.innerHTML=`<span class="ppbadge lean-${neutral?'n':overSide?'o':'u'}">${neutral?'PICK':overSide?'OVER':'UNDER'} ${Math.round(prob*100)}%</span> <span class="ppodds">${ppFair(prob)>0?'+':''}${ppFair(prob)}</span>${push>0.02?` <span class="mk" style="font-size:10px">push ${Math.round(push*100)}%</span>`:''}`;
}
function ppRows(players){
  let html='';
  players.forEach(pl=>{
    pl.markets.forEach((m,mi)=>{
      const idx=PP_ROWS.length; PP_ROWS.push(m);
      const isProb=m.dist==='prob';
      const defLine=isProb?0.5:Math.round(m.proj*2)/2;
      const first=mi===0;
      const lineCell=isProb?`<td class="c mk">TD ≥ 1</td>`
        :`<td class="c"><input class="ppline" data-i="${idx}" value="${defLine}" oninput="ppUpdate(${idx})"></td>`;
      html+=`<tr${first?' style="border-top:2px solid #26324d"':''}>
        <td class="plr">${first?esc(pl.name)+' <span class="mk" style="font-weight:400">'+pl.pos+'</span>':''}</td>
        <td class="mk">${esc(m.label)}</td>
        <td class="r">${isProb?Math.round(m.proj*100)+'%':m.proj}</td>
        ${lineCell}
        <td id="pp-${idx}"></td></tr>`;
    });
  });
  return html;
}
async function viewProps(params){
  await ensureRankings();
  const h=(params&&params.get('home'))||RANKINGS[0].team;
  const a=(params&&params.get('away'))||RANKINGS[RANKINGS.length-1].team;
  const neutral=(params&&params.get('neutral'))==='1';
  app().innerHTML=`<div class="pad"><div class="card">
    <h2>Player Props <span>projected stat lines + over/under · pick a matchup</span></h2>
    <div class="selrow"><select id="ppAway">${teamOptions(a)}</select><span class="at">@</span><select id="ppHome">${teamOptions(h)}</select></div>
    <div class="opts"><input type="checkbox" id="ppNeutral" ${neutral?'checked':''}><label for="ppNeutral">Neutral site</label></div>
    <button id="ppGo">Project props</button>
    <div id="ppResult"></div>
  </div></div>`;
  const run=()=>{ const H=document.getElementById('ppHome').value, A=document.getElementById('ppAway').value, N=document.getElementById('ppNeutral').checked?1:0;
    if(H===A){ alert('Pick two different teams'); return; } go(`#/props?home=${H}&away=${A}&neutral=${N}`); };
  document.getElementById('ppGo').addEventListener('click',run);
  if(!params||!params.get('home')) return;
  const res=document.getElementById('ppResult'); res.innerHTML='<div class="loading">Projecting stat lines…</div>';
  const d=await j(`/api/props?home=${h}&away=${a}&neutral=${neutral?1:0}`);
  if(d.error){ res.innerHTML=`<div class="note warn">${esc(d.error)}</div>`; return; }
  PP_ROWS=[];
  const head=`<tr><th>Player</th><th>Market</th><th class="r">Proj</th><th class="c">Line</th><th>Model lean · fair odds</th></tr>`;
  const teamBlock=(t)=>`<div class="bxs" style="font-size:13px;margin:14px 0 4px">${esc(META[t]?META[t].name:t)}</div>
    <div style="overflow-x:auto"><table class="pptbl"><thead>${head}</thead><tbody>${ppRows(d.teams[t]||[])}</tbody></table></div>`;
  const p=d.pred;
  res.innerHTML=`<div class="note" style="margin:14px 0 4px">Projected: <b>${a} ${p.pred_away_score.toFixed(0)} — ${p.pred_home_score.toFixed(0)} ${h}</b>. Enter a book line to see the model's over/under lean + fair (no-vig) odds. Our number is opponent-adjusted and game-script-shaped — but the book already prices most of this, so treat leans as a starting point, not a lock.</div>
    ${teamBlock(a)}${teamBlock(h)}`;
  PP_ROWS.forEach((_,i)=>{ if(document.getElementById('pp-'+i)) ppUpdate(i); });   // prime all rows
}

// ── VIEW: schedule (weekly slate, auto-predicted) ───────────────────
function schCard(g){
  const pred = g.pred_home!=null;
  const fav = pred ? (g.pred_margin>=0?g.home:g.away) : '';
  const hp = pred ? Math.round(g.home_win_prob*100) : 50, ap = 100-hp;
  const veg = g.vegas_spread==null ? '—'
      : g.vegas_spread>0 ? `${g.home} -${g.vegas_spread}`
      : g.vegas_spread<0 ? `${g.away} -${Math.abs(g.vegas_spread)}` : 'PK';
  const injPts = ((g.inj_home&&g.inj_home.pts)||0)+((g.inj_away&&g.inj_away.pts)||0);
  let fin='';
  if(g.final && g.home_score!=null){
    let mark='';
    if(pred){ const pickHome=g.pred_margin>=0, homeWon=g.home_score>g.away_score;
      mark = pickHome===homeWon ? ' <span style="color:var(--good)">✓</span>' : ' <span style="color:var(--bad)">✗</span>'; }
    fin = `<div class="gc-final">Final: ${g.away} ${g.away_score} — ${g.home_score} ${g.home}${mark}</div>`;
  }
  const top = g.pick_rank;
  // the pick's actual number: lay it if we're on the favorite, take it if we're on the dog
  const pickNum = g.vegas_spread==null ? null : (g.ats_pick===g.home ? -g.vegas_spread : g.vegas_spread);
  const pickStr = pickNum==null ? g.ats_pick
      : Math.abs(pickNum)<0.05 ? `${g.ats_pick} PK`
      : `${g.ats_pick} ${pickNum>0?'+':''}${pickNum}`;
  const edgeRow = g.cover_prob!=null
    ? `<div class="gc-edge"><span>ATS pick · cover prob</span><b>${pickStr} · ${Math.round(g.cover_prob*100)}%</b></div>` : '';
  const totalRow = g.total_prob!=null
    ? `<div class="gc-row"><span>Total pick</span><b>${g.total_pick} ${g.vegas_total??''} · ${Math.round(g.total_prob*100)}%</b></div>` : '';
  const blendRow = g.blend_margin!=null
    ? `<div class="gc-row"><span>Best est · model+market</span><b>${g.blend_margin>=0?g.home:g.away} -${Math.abs(g.blend_margin).toFixed(1)}</b></div>` : '';
  return `<div class="gcard${top?' top':''}" onclick="go('#/matchup?home=${g.home}&away=${g.away}')">
    ${top?`<div class="gc-badge">🔥 Top Pick #${top}</div>`:''}
    ${g.neutral?`<div class="gc-badge" style="left:auto;right:12px;background:#0e7490">🌍 Neutral</div>`:''}
    <div class="gc-tms">
      <div class="gc-tm"><img src="${g.away_logo}" onerror="this.style.visibility='hidden'"><div class="gc-ab">${g.away}</div><div class="gc-sc">${pred?g.pred_away.toFixed(0):'–'}</div></div>
      <div class="gc-mid">@</div>
      <div class="gc-tm"><img src="${g.home_logo}" onerror="this.style.visibility='hidden'"><div class="gc-ab">${g.home}</div><div class="gc-sc">${pred?g.pred_home.toFixed(0):'–'}</div></div>
    </div>
    <div class="gc-prob"><div style="width:${ap}%;background:${g.away_color}"></div><div style="width:${hp}%;background:${g.home_color}"></div></div>
    <div class="gc-row"><span>Model proj</span><b>${pred?`${fav} -${Math.abs(g.pred_margin).toFixed(1)}`:'—'}</b></div>
    <div class="gc-row"><span>Vegas line</span><b>${veg}</b></div>
    ${blendRow}
    ${edgeRow}
    <div class="gc-row"><span>Total · model / Vegas</span><b>${pred?g.pred_total.toFixed(1):'—'} / ${g.vegas_total??'—'}</b></div>
    ${totalRow}
    ${injPts>0?`<div class="gc-row"><span>⚕ injury adjust</span><b>−${injPts.toFixed(1)} pts</b></div>`:''}
    ${fin}
    ${g.context_notes&&g.context_notes.length?`<div class="gc-ctx">${g.neutral?'🌍':'✈️'} ${esc(g.context_notes.join(' · '))}</div>`:''}
    <div class="gc-row" style="margin-top:6px"><span>${esc(g.gameday||'')} ${esc(g.gametime||'')}</span><span>details ›</span></div>
  </div>`;
}

async function viewSchedule(params){
  const qs = new URLSearchParams();
  if(params.get('season')) qs.set('season', params.get('season'));
  if(params.get('week'))   qs.set('week', params.get('week'));
  app().innerHTML = `<div class="pad">
    <div class="viewhead">
      <div class="ttl">Weekly Schedule <span>every game auto-predicted (roster + injuries)</span></div>
      <div style="display:flex;gap:8px">
        <select id="schSeason" class="pick" style="min-width:110px"></select>
        <select id="schWeek" class="pick" style="min-width:120px"></select>
      </div>
    </div>
    <div id="schBody"><div class="loading">Predicting the slate… (first load builds the model, ~15s)</div></div>
  </div>`;
  const d = await j('/api/schedule?'+qs.toString());
  const ss=document.getElementById('schSeason'), sw=document.getElementById('schWeek');
  ss.innerHTML = (d.seasons||[]).map(s=>`<option value="${s}" ${s==d.season?'selected':''}>${s} season</option>`).join('');
  sw.innerHTML = (d.weeks||[]).map(w=>`<option value="${w}" ${w==d.week?'selected':''}>Week ${w}</option>`).join('');
  ss.onchange=()=>go(`#/schedule?season=${ss.value}&week=1`);
  sw.onchange=()=>go(`#/schedule?season=${ss.value}&week=${sw.value}`);
  const body=document.getElementById('schBody');
  if(!d.games||!d.games.length){ body.innerHTML=`<div class="note warn">No games found for this week.</div>`; return; }
  const picks = d.games.filter(g=>g.pick_rank).sort((a,b)=>a.pick_rank-b.pick_rank);
  const strip = picks.length ? `<div class="card" style="padding:14px">
      <h2 style="margin:0 0 10px">🔥 Top 5 picks <span>real edge (≥2.5 pts vs the line), ranked by cover probability</span></h2>
      <div class="toppicks">${picks.map(g=>{
        const pn = g.vegas_spread==null?null:(g.ats_pick===g.home?-g.vegas_spread:g.vegas_spread);
        const ps = pn==null?g.ats_pick:Math.abs(pn)<0.05?`${g.ats_pick} PK`:`${g.ats_pick} ${pn>0?'+':''}${pn}`;
        return `<div class="tp" onclick="go('#/matchup?home=${g.home}&away=${g.away}')">
        <span class="rk">${g.pick_rank}</span><b>${ps}</b>&nbsp;${g.away}@${g.home} · ${Math.round(g.cover_prob*100)}% cover · ${Math.abs(g.edge).toFixed(1)} pt edge</div>`;}).join('')}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:8px">Two-stage: only games where the model disagrees with the line by ≥2.5 points qualify, then those are ranked by key-number-aware cover probability (so a real edge in a good key-number spot rises). Fewer than 5 may show if the slate is efficient — and these are not guaranteed winners (the model doesn't reliably beat NFL spreads out-of-sample; see the backtest).</div>
    </div>` : '';
  body.innerHTML = strip + `<div id="schAcc"></div>`
    + `<div class="note">Click any game for the full breakdown (schemes, form, injuries, box score). ${picks.length?'Qualifying edge plays highlighted below.':''}</div>`
    + `<div class="sched">${d.games.map(schCard).join('')}</div>`;
  // honest accuracy vs the market (background; cached server-side)
  try{
    const b = await j('/api/backtest?season='+d.season);
    if(b && !b.error){
      const beat = b.model_margin_mae < b.market_margin_mae;
      document.getElementById('schAcc').innerHTML = `<div class="note ${beat?'':'warn'}">
        <b>Model check (${b.season}, in-sample):</b> margin MAE ${b.model_margin_mae} vs closing line ${b.market_margin_mae}${b.blended_margin_mae!=null?` · blended ${b.blended_margin_mae} (best est = ${Math.round((b.blend_weight||0)*100)}% market)`:''}
        · straight-up ${Math.round(b.winner_acc*100)}% · ATS ${Math.round(b.ats_in_sample*100)}%.
        <span style="opacity:.85">${esc(b.note)}</span></div>`;
    }
  }catch(e){}
}

// ── VIEW: refresh ───────────────────────────────────────────────────
async function viewRefresh(){
  const saved = localStorage.getItem('nfl_refresh_token') || '';
  app().innerHTML = `<div class="pad"><div class="card">
    <h2>Data Refresh <span>pull latest injuries &amp; stats</span></h2>
    <div class="note">Downloads the current season's nflverse data (injuries, play-by-play, schedules)
      and recomputes team styles &amp; situational tables. Runs in the background (up to a minute) and
      also refreshes automatically every night.</div>
    <div id="rfStatus" class="rfstat">Checking status…</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px">
      <input id="rfToken" type="password" placeholder="Refresh token" value="${esc(saved)}" autocomplete="off"
             style="flex:1;min-width:200px;max-width:340px;background:var(--panel2);color:var(--txt);
                    border:1px solid var(--line);border-radius:9px;padding:10px;font-size:14px">
      <button id="rfGo" style="max-width:200px">Refresh now</button>
    </div>
    <div style="color:var(--muted);font-size:11.5px;margin-top:8px">Set by the site owner (Railway
      <code>REFRESH_TOKEN</code>). Saved in this browser after a successful run.</div>
  </div></div>`;
  const statusEl=document.getElementById('rfStatus'), btn=document.getElementById('rfGo'), tokEl=document.getElementById('rfToken');
  async function poll(){
    try{
      const s = await j('/api/refresh/status');
      const color = s.running?'var(--warn)':'var(--good)';
      const last = s.last_refresh? new Date(s.last_refresh.finished||s.last_refresh.time||Date.now()).toLocaleString() : 'never';
      statusEl.innerHTML = `<span class="dot" style="background:${color}"></span>${s.running?'Refresh running…':'Idle'} · data last updated: ${esc(last)}`
        + (s.log_tail?`<div style="margin-top:8px;font-family:monospace;font-size:11px;color:var(--muted);white-space:pre-wrap">${esc(s.log_tail)}</div>`:'');
      btn.disabled = !!s.running;
      if(s.running) setTimeout(poll, 3000);
    }catch(e){ statusEl.innerHTML = `<span class="dot" style="background:var(--muted)"></span>Refresh endpoint not available on this deployment yet.`; btn.disabled=true; }
  }
  async function doRefresh(){
    const tok = (tokEl.value||'').trim();          // trim: paste often adds a trailing space
    if(!tok){ statusEl.textContent='Enter the refresh token first.'; tokEl.focus(); return; }
    btn.disabled=true; statusEl.textContent='Starting refresh…';
    try{
      const r = await fetch('/api/refresh', {method:'POST', headers:{'X-Refresh-Token':tok}});
      if(r.status===401){ statusEl.textContent='Invalid token — check for typos or extra spaces (it is case-sensitive).'; btn.disabled=false; return; }
      if(r.status===403){ statusEl.textContent='Refresh is disabled on the server (no REFRESH_TOKEN configured).'; btn.disabled=false; return; }
      if(r.status!==409){ localStorage.setItem('nfl_refresh_token', tok); }   // remember a working token
      poll();
    }catch(e){ statusEl.textContent='Could not reach the server.'; btn.disabled=false; }
  }
  btn.addEventListener('click', doRefresh);
  tokEl.addEventListener('keydown', e=>{ if(e.key==='Enter') doRefresh(); });
  poll();
}

window.addEventListener('hashchange', route);
route();
