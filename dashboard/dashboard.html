<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QuAint NFL Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#05060a;--bg1:#0b0d14;--bg2:#11131c;--bg3:#181b26;--bg4:#1f2231;
  --border:#ffffff0d;--border2:#ffffff18;--border3:#ffffff28;
  --text0:#eeecea;--text1:#b0aca4;--text2:#6a6660;--text3:#38352f;
  --gold:#c9a84c;--gold2:#e8c96a;--gold-dim:#6b5520;
  --green:#3dd68c;--red:#f0584a;--blue:#4a9ef0;--amber:#f0a84a;--purple:#9b6ef0;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--text0);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:#05060af0;backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 24px;gap:0;}
.brand{display:flex;align-items:center;gap:10px;margin-right:32px;text-decoration:none;}
.brand-logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  display:flex;align-items:center;justify-content:center;font-size:14px;}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--text0);}
.brand-sub{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;}
.tabs{display:flex;gap:2px;flex:1;}
.tab{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:.03em;background:transparent;color:var(--text2);transition:all .12s;}
.tab:hover{color:var(--text1);background:var(--bg3);}
.tab.active{background:var(--gold);color:#000;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
select.week-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--gold);
  font-family:'DM Mono',monospace;font-size:11px;padding:4px 8px;border-radius:5px;cursor:pointer;}

/* LAYOUT */
.page{display:none;}.page.active{display:block;}
.container{max-width:1200px;margin:0 auto;padding:24px 20px;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;}
.card-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;}
.card-body{padding:16px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:700;letter-spacing:.05em;border:1px solid;}
.b-gold{color:var(--gold);border-color:#c9a84c40;background:#c9a84c0d;}
.b-green{color:var(--green);border-color:#3dd68c40;background:#3dd68c0d;}
.b-red{color:var(--red);border-color:#f0584a40;background:#f0584a0d;}
.b-blue{color:var(--blue);border-color:#4a9ef040;background:#4a9ef00d;}
.b-gray{color:var(--text2);border-color:#6a666040;background:transparent;}
.b-elite{color:#e8c96a;border-color:#c9a84c50;background:#c9a84c12;}
.b-above{color:#3dd68c;border-color:#3dd68c40;background:#3dd68c0d;}
.b-avg{color:var(--text1);border-color:#b0aca440;background:transparent;}
.b-below{color:var(--red);border-color:#f0584a40;background:#f0584a0d;}

/* GAME CARDS */
.games-grid{display:flex;flex-direction:column;gap:8px;}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px 18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.game-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .15s;}
.game-card.edge::before{background:var(--green);}
.game-card.edge{border-color:#3dd68c18;background:#3dd68c05;}
.game-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.game-card.selected{border-color:var(--gold)40;background:#c9a84c08;}
.game-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.matchup{display:flex;align-items:center;gap:8px;}
.team-chip{display:flex;align-items:center;gap:6px;}
.team-logo{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;color:#fff;flex-shrink:0;}
.team-name{font-weight:700;font-size:13px;color:var(--text0);}
.at{color:var(--text3);font-size:11px;}
.game-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.stat{text-align:center;}
.stat-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text0);line-height:1;}
.stat-val.g{color:var(--green);}.stat-val.r{color:var(--red);}.stat-val.gold{color:var(--gold);}
.stat-lbl{font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;}
.range-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:8px;position:relative;overflow:hidden;}
.range-fill{position:absolute;top:0;height:100%;background:var(--gold);opacity:.4;border-radius:2px;}
.range-marker{position:absolute;top:-2px;width:3px;height:8px;background:var(--gold);border-radius:1px;}

/* DETAIL PANEL */
.detail-panel{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-top:16px;}
.detail-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
.detail-score{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text0);}
.detail-range{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);margin-left:8px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.team-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.team-box-name{font-weight:700;font-size:13px;color:var(--text0);margin-bottom:10px;}
.quality-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.quality-label{font-size:11px;color:var(--text2);}
.quality-bar{flex:1;margin:0 8px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.quality-fill{height:100%;border-radius:3px;transition:width .4s;}
.quality-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text0);min-width:28px;text-align:right;}
.matchup-list{margin-top:12px;}
.matchup-row{display:grid;grid-template-columns:60px 1fr auto 1fr 70px;align-items:center;gap:8px;
  padding:7px 0;border-bottom:1px solid var(--border);font-size:11px;}
.matchup-slot{color:var(--gold);font-weight:700;font-family:'DM Mono',monospace;font-size:10px;}
.matchup-off{color:var(--text0);font-weight:600;}
.matchup-vs{color:var(--text3);}
.matchup-def{color:var(--text1);}
.edge-pill{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;
  padding:2px 6px;border-radius:3px;text-align:right;}

/* PLAYERS TABLE */
.pos-tabs{display:flex;gap:4px;margin-bottom:14px;}
.pos-tab{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;
  font-size:11px;font-weight:700;letter-spacing:.05em;background:var(--bg2);color:var(--text2);transition:all .12s;}
.pos-tab.active{background:var(--gold);color:#000;border-color:var(--gold);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:right;padding:7px 10px;color:var(--text3);font-weight:700;font-size:10px;
  text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap;}
th:first-child,th:nth-child(2){text-align:left;}
td{padding:9px 10px;border-bottom:1px solid var(--border);text-align:right;color:var(--text1);}
td:first-child{text-align:left;font-weight:600;color:var(--text0);}
td:nth-child(2){text-align:left;}
tr:hover td{background:var(--bg3);}
.score-bar{display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.mini-bar{width:50px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.mini-fill{height:100%;border-radius:2px;background:var(--gold);}

/* STYLES PAGE */
.style-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.style-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.style-team{font-weight:700;font-size:13px;color:var(--text0);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.style-tag{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.style-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text0);}
.style-metric-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}

/* BACKTEST PAGE */
.metric-big{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;color:var(--gold);line-height:1;}
.metric-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.week-bars{display:flex;align-items:flex-end;gap:3px;height:60px;margin-top:12px;}
.week-bar{flex:1;border-radius:2px 2px 0 0;transition:all .3s;cursor:pointer;position:relative;}
.week-bar:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  background:var(--bg1);border:1px solid var(--border2);padding:3px 6px;border-radius:4px;font-size:10px;white-space:nowrap;z-index:10;}

/* SPINNERS / STATES */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;color:var(--text3);padding:40px;font-size:13px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.page.active .container{animation:fadeUp .2s ease;}
</style>
</head>
<body>

<nav>
  <a class="brand" href="#">
    <div class="brand-logo">🏈</div>
    <div><div class="brand-name">QuAint NFL</div><div class="brand-sub">Prediction Engine</div></div>
  </a>
  <div class="tabs">
    <button class="tab active" onclick="showPage('games',this)">Games</button>
    <button class="tab" onclick="showPage('players',this)">Players</button>
    <button class="tab" onclick="showPage('styles',this)">Team Styles</button>
    <button class="tab" onclick="showPage('backtest',this)">Backtest</button>
  </div>
  <div class="nav-right">
    <select class="week-sel" id="weekSel" onchange="onWeekChange()">
      <option value="">Loading...</option>
    </select>
  </div>
</nav>

<!-- GAMES -->
<div class="page active" id="page-games">
  <div class="container">
    <div id="games-loading" class="loading"><div class="spinner"></div>Loading predictions...</div>
    <div id="games-content" style="display:none">
      <div class="games-grid" id="games-grid"></div>
      <div id="game-detail"></div>
    </div>
  </div>
</div>

<!-- PLAYERS -->
<div class="page" id="page-players">
  <div class="container">
    <div class="pos-tabs" id="pos-tabs">
      <button class="pos-tab active" onclick="switchPos('QB',this)">QB</button>
      <button class="pos-tab" onclick="switchPos('RB',this)">RB</button>
      <button class="pos-tab" onclick="switchPos('WR',this)">WR</button>
      <button class="pos-tab" onclick="switchPos('TE',this)">TE</button>
    </div>
    <div id="players-loading" class="loading"><div class="spinner"></div>Loading players...</div>
    <div id="players-content" style="display:none;overflow-x:auto;">
      <table id="players-table"></table>
    </div>
  </div>
</div>

<!-- STYLES -->
<div class="page" id="page-styles">
  <div class="container">
    <div id="styles-loading" class="loading"><div class="spinner"></div>Loading team styles...</div>
    <div id="styles-content" style="display:none">
      <div id="styles-grid"></div>
    </div>
  </div>
</div>

<!-- BACKTEST -->
<div class="page" id="page-backtest">
  <div class="container">
    <div id="bt-loading" class="loading"><div class="spinner"></div>Loading backtest data...</div>
    <div id="bt-content" style="display:none">
      <div class="grid4" style="margin-bottom:20px" id="bt-metrics"></div>
      <div class="card">
        <div class="card-header"><span class="card-title">Winner accuracy by week</span></div>
        <div class="card-body">
          <div class="week-bars" id="bt-bars"></div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--text3);" id="bt-labels"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';  // same origin
let state = { season: '2024', week: '15', pos: 'QB', selectedGame: null, games: [], teams: {} };

// ── Team colors ────────────────────────────────────────────────
const TC = {
  DAL:'#003594',PHI:'#004C54',NYG:'#0B2265',WAS:'#5A1414',CHI:'#0B162A',
  GB:'#203731',DET:'#0076B6',MIN:'#4F2683',ATL:'#A71930',NO:'#B3995D',
  CAR:'#0085CA',TB:'#D50A0A',SF:'#AA0000',SEA:'#002244',LAR:'#003594',
  ARI:'#97233F',NE:'#002244',NYJ:'#125740',BUF:'#00338D',MIA:'#008E97',
  BAL:'#241773',PIT:'#FFB612',CLE:'#311D00',CIN:'#FB4F14',TEN:'#4B92DB',
  HOU:'#03202F',IND:'#002C5F',JAX:'#006778',DEN:'#FB4F14',KC:'#E31837',
  LV:'#3D3D3D',LAC:'#0080C6',LA:'#003594',
};

function teamLogo(code, size=24) {
  const c = TC[code] || '#334';
  return `<div class="team-logo" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.32)}px;background:${c}cc;border:1px solid ${c};">${code}</div>`;
}

function signalBadge(sig) {
  if (!sig || sig === 'PASS') return `<span class="badge b-gray">PASS</span>`;
  if (sig.startsWith('BET HOME')) return `<span class="badge b-green">${sig}</span>`;
  if (sig.startsWith('BET AWAY')) return `<span class="badge b-red">${sig}</span>`;
  if (sig.startsWith('OVER'))     return `<span class="badge b-blue">${sig}</span>`;
  if (sig.startsWith('UNDER'))    return `<span class="badge b-amber" style="color:var(--amber);border-color:#f0a84a40;background:#f0a84a0d;">${sig}</span>`;
  return `<span class="badge b-gray">${sig}</span>`;
}

function tierBadge(tier) {
  const cls = {Elite:'b-elite','Above Avg':'b-above',Average:'b-avg','Below Avg':'b-below',Poor:'b-below'};
  return `<span class="badge ${cls[tier]||'b-gray'}">${tier}</span>`;
}

function fmt(n, d=1) { return n != null ? (+n).toFixed(d) : '—'; }
function fmtPct(n) { return n != null ? (n*100).toFixed(1)+'%' : '—'; }

// ── INIT ───────────────────────────────────────────────────────
async function init() {
  await loadWeeks();
  loadGames();
  loadTeams();
}

async function loadWeeks() {
  try {
    const weeks = await fetch(`${API}/api/weeks`).then(r=>r.json());
    const sel = document.getElementById('weekSel');
    if (weeks.length === 0) {
      sel.innerHTML = '<option value="">No predictions yet</option>';
      return;
    }
    sel.innerHTML = weeks.map(w =>
      `<option value="${w.season}|${w.week}">${w.label}</option>`
    ).join('');
    // Default to most recent
    const last = weeks[weeks.length-1];
    state.season = last.season;
    state.week   = last.week;
    sel.value = `${last.season}|${last.week}`;
  } catch(e) {
    console.error('loadWeeks:', e);
  }
}

async function loadTeams() {
  try {
    const teams = await fetch(`${API}/api/teams`).then(r=>r.json());
    teams.forEach(t => state.teams[t.team_abbr] = t);
  } catch(e) {}
}

function onWeekChange() {
  const val = document.getElementById('weekSel').value;
  if (!val) return;
  const [season, week] = val.split('|');
  state.season = season; state.week = week;
  state.selectedGame = null;
  document.getElementById('game-detail').innerHTML = '';
  loadGames();
}

// ── GAMES ──────────────────────────────────────────────────────
async function loadGames() {
  show('games-loading'); hide('games-content');
  try {
    const data = await fetch(`${API}/api/predictions?season=${state.season}&week=${state.week}`).then(r=>r.json());
    if (data.error) { showError('games-loading', data.error); return; }
    state.games = data;
    renderGames(data);
    show('games-content'); hide('games-loading');
  } catch(e) {
    showError('games-loading', 'Could not load predictions. Is the server running?');
  }
}

function renderGames(games) {
  const grid = document.getElementById('games-grid');
  grid.innerHTML = games.map((g,i) => {
    const hp = g.predicted_home_score, ap = g.predicted_away_score;
    const hwin = g.home_win_probability > 0.5;
    const spread = g.predicted_spread;
    const hasEdge = Math.abs(spread) >= 3;
    return `<div class="game-card${hasEdge?' edge':''}" onclick="selectGame(${i})">
      <div class="game-top">
        <div class="matchup">
          ${teamLogo(g.away_team)}
          <div class="team-chip"><span class="team-name">${g.away_team}</span></div>
          <span class="at">@</span>
          <div class="team-chip"><span class="team-name">${g.home_team}</span></div>
          ${teamLogo(g.home_team)}
        </div>
        <div style="display:flex;gap:5px;align-items:center;">
          <span class="badge b-gray" style="font-family:'DM Mono',monospace;">${g.game_script}</span>
        </div>
      </div>
      <div class="game-stats">
        <div class="stat">
          <div class="stat-val${!hwin?' g':''}">${fmt(ap)}</div>
          <div class="stat-lbl">${g.away_team} pts</div>
        </div>
        <div class="stat">
          <div class="stat-val${hwin?' g':''}">${fmt(hp)}</div>
          <div class="stat-lbl">${g.home_team} pts</div>
        </div>
        <div class="stat">
          <div class="stat-val gold">${fmt(g.predicted_total)}</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat">
          <div class="stat-val${spread<-2?' g':spread>2?' r':''}">${spread>0?'+':''}${fmt(spread)}</div>
          <div class="stat-lbl">Spread (H)</div>
        </div>
        <div class="stat">
          <div class="stat-val">${fmtPct(hwin?g.home_win_probability:g.away_win_probability)}</div>
          <div class="stat-lbl">${hwin?g.home_team:g.away_team} win</div>
        </div>
        <div class="stat">
          <div class="stat-val" style="font-size:11px;">${g.total_floor}–${g.total_ceiling}</div>
          <div class="stat-lbl">Range</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectGame(idx) {
  state.selectedGame = idx;
  document.querySelectorAll('.game-card').forEach((c,i)=>c.classList.toggle('selected',i===idx));
  renderGameDetail(state.games[idx]);
  document.getElementById('game-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderGameDetail(g) {
  const h = g.home_team, a = g.away_team;
  const hwin = g.home_win_probability > 0.5;
  const winner = hwin ? h : a;
  const winProb = hwin ? g.home_win_probability : g.away_win_probability;

  const km = (g.key_matchups||[]).map(m => {
    const edge = m.edge || 0;
    const color = edge > 0 ? 'var(--green)' : 'var(--red)';
    return `<div class="matchup-row">
      <span class="matchup-slot">${m.slot}</span>
      <span class="matchup-off">${m.off_player||'—'}</span>
      <span class="matchup-vs">vs</span>
      <span class="matchup-def">${m.def_player||'—'}</span>
      <span class="edge-pill" style="color:${color};background:${color}18;">${edge>0?'+':''}${fmt(edge)} ${m.grade||''}</span>
    </div>`;
  }).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0;">No key matchup data</div>';

  function qBar(val, color='var(--gold)') {
    return `<div class="quality-bar"><div class="quality-fill" style="width:${val||0}%;background:${color};"></div></div>`;
  }

  document.getElementById('game-detail').innerHTML = `
    <div class="detail-panel">
      <div class="detail-header">
        <div>
          <div style="font-size:11px;color:var(--text2);margin-bottom:4px;">${a} @ ${h} · Week ${g.week} ${g.season}</div>
          <div class="detail-score">${a} ${fmt(g.predicted_away_score)} – ${fmt(g.predicted_home_score)} ${h}
            <span class="detail-range">(${g.away_floor}–${g.away_ceiling} / ${g.home_floor}–${g.home_ceiling})</span>
          </div>
          <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;">
            <span class="badge b-gold">${winner} win ${fmtPct(winProb)}</span>
            <span class="badge b-gray">Total ${fmt(g.predicted_total)} (${g.total_floor}–${g.total_ceiling})</span>
            <span class="badge b-gray">${g.game_script}</span>
            ${g.conditions_notes ? `<span class="badge b-gray" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;">${g.conditions_notes.split('|')[0]}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="detail-grid">
        <div class="team-box">
          <div class="team-box-name">${teamLogo(h,20)} ${h} (Home)</div>
          <div class="quality-row"><span class="quality-label">Offense</span>${qBar(g.home_off_quality,'var(--gold)')}<span class="quality-val">${fmt(g.home_off_quality,0)}</span></div>
          <div class="quality-row"><span class="quality-label">Defense</span>${qBar(g.home_def_quality,'var(--blue)')}<span class="quality-val">${fmt(g.home_def_quality,0)}</span></div>
          <div class="quality-row"><span class="quality-label">QB Score</span>${qBar(g.home_qb_score,'var(--purple)')}<span class="quality-val">${fmt(g.home_qb_score,0)}</span></div>
          <div style="margin-top:8px;font-size:11px;color:var(--text2);">
            <span class="badge b-gold" style="margin-right:4px;">${g.home_off_label}</span>
            <span class="badge b-blue" style="color:var(--blue);border-color:#4a9ef040;background:#4a9ef00d;">${g.home_def_label}</span>
          </div>
          <div style="margin-top:6px;font-size:11px;color:var(--text2);">Pass ${fmtPct(g.home_pred_pass_rate)} / Rush ${fmtPct(g.home_pred_rush_rate)}</div>
        </div>
        <div class="team-box">
          <div class="team-box-name">${teamLogo(a,20)} ${a} (Away)</div>
          <div class="quality-row"><span class="quality-label">Offense</span>${qBar(g.away_off_quality,'var(--gold)')}<span class="quality-val">${fmt(g.away_off_quality,0)}</span></div>
          <div class="quality-row"><span class="quality-label">Defense</span>${qBar(g.away_def_quality,'var(--blue)')}<span class="quality-val">${fmt(g.away_def_quality,0)}</span></div>
          <div class="quality-row"><span class="quality-label">QB Score</span>${qBar(g.away_qb_score,'var(--purple)')}<span class="quality-val">${fmt(g.away_qb_score,0)}</span></div>
          <div style="margin-top:8px;font-size:11px;color:var(--text2);">
            <span class="badge b-gold" style="margin-right:4px;">${g.away_off_label}</span>
            <span class="badge b-blue" style="color:var(--blue);border-color:#4a9ef040;background:#4a9ef00d;">${g.away_def_label}</span>
          </div>
          <div style="margin-top:6px;font-size:11px;color:var(--text2);">Pass ${fmtPct(g.away_pred_pass_rate)} / Rush ${fmtPct(g.away_pred_rush_rate)}</div>
        </div>
      </div>
      <div style="margin-top:16px;">
        <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Key Matchups</div>
        <div class="matchup-list">${km}</div>
      </div>
      ${g.style_clash_summary ? `<div style="margin-top:12px;font-size:11px;color:var(--text2);">Style clashes: <span style="color:var(--text1);">${g.style_clash_summary}</span></div>` : ''}
    </div>`;
}

// ── PLAYERS ────────────────────────────────────────────────────
async function loadPlayers(pos) {
  show('players-loading'); hide('players-content');
  try {
    const data = await fetch(`${API}/api/composite?season=${state.season}&week=${state.week}&position=${pos}`).then(r=>r.json());
    if (data.error) { showError('players-loading', data.error); return; }
    renderPlayers(data, pos);
    show('players-content'); hide('players-loading');
  } catch(e) {
    showError('players-loading', 'Could not load player data.');
  }
}

function switchPos(pos, el) {
  state.pos = pos;
  document.querySelectorAll('.pos-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadPlayers(pos);
}

function renderPlayers(players, pos) {
  const headers = {
    QB:  ['Player','Team','Composite','Pass Eff','Usage','Tracking','Athleticism','Tier'],
    RB:  ['Player','Team','Composite','Rush Eff','Usage','Tracking','Athleticism','Tier'],
    WR:  ['Player','Team','Composite','Rec Eff','Usage','Separation','Athleticism','Tier'],
    TE:  ['Player','Team','Composite','Rec Eff','Usage','Tracking','Athleticism','Tier'],
  };
  const hdrs = headers[pos] || headers.WR;
  const max = Math.max(...players.map(p=>p.adjusted_score||0), 1);

  let html = `<thead><tr>${hdrs.map((h,i)=>`<th style="${i>=2?'text-align:right':''}">${h}</th>`).join('')}</tr></thead><tbody>`;
  players.forEach(p => {
    const bar = ((p.adjusted_score||0)/max*100).toFixed(0);
    html += `<tr>
      <td>${p.player_display_name||'—'}</td>
      <td>${teamLogo(p.recent_team,20)}</td>
      <td><div class="score-bar"><div class="mini-bar"><div class="mini-fill" style="width:${bar}%"></div></div><span style="font-family:'DM Mono',monospace;color:var(--gold);font-weight:500;">${fmt(p.adjusted_score)}</span></div></td>
      <td style="font-family:'DM Mono',monospace;">${fmt(p.efficiency_score)}</td>
      <td style="font-family:'DM Mono',monospace;">${fmt(p.usage_score)}</td>
      <td style="font-family:'DM Mono',monospace;">${fmt(p.tracking_score)}</td>
      <td style="font-family:'DM Mono',monospace;">${fmt(p.athleticism_score)}</td>
      <td>${tierBadge(p.tier||'Average')}</td>
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('players-table').innerHTML = html;
}

// ── TEAM STYLES ────────────────────────────────────────────────
async function loadStyles() {
  show('styles-loading'); hide('styles-content');
  try {
    const data = await fetch(`${API}/api/styles?season=${state.season}`).then(r=>r.json());
    if (data.error) { showError('styles-loading', data.error); return; }
    renderStyles(data);
    show('styles-content'); hide('styles-loading');
  } catch(e) {
    showError('styles-loading', 'Could not load team styles.');
  }
}

function renderStyles(teams) {
  const sorted = [...teams].sort((a,b) => (b.def_quality_score||50) - (a.def_quality_score||50));
  const grid = document.getElementById('styles-grid');

  const offSort = [...teams].sort((a,b) => (b.off_epa_per_play||0) - (a.off_epa_per_play||0));
  const defSort = sorted;

  grid.innerHTML = `
    <div style="margin-bottom:16px;">
      <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Offensive Style Rankings</div>
      <table>
        <thead><tr>
          <th style="text-align:left;">Team</th>
          <th>Style</th><th>EPA/Play</th><th>Pass%</th><th>Avg Air Yds</th><th>Pace</th>
        </tr></thead>
        <tbody>${offSort.map(t=>`<tr>
          <td>${teamLogo(t.team,20)} ${t.team}</td>
          <td><span class="badge b-gold">${t.offense_label||'—'}</span></td>
          <td style="font-family:'DM Mono',monospace;color:${(t.off_epa_per_play||0)>0?'var(--green)':'var(--red)'};">${t.off_epa_per_play!=null?(t.off_epa_per_play>0?'+':'')+fmt(t.off_epa_per_play,3):'—'}</td>
          <td style="font-family:'DM Mono',monospace;">${t.pass_rate_overall!=null?fmtPct(t.pass_rate_overall):'—'}</td>
          <td style="font-family:'DM Mono',monospace;">${fmt(t.avg_air_yards)}</td>
          <td style="font-family:'DM Mono',monospace;">${fmt(t.pace)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Defensive Quality Rankings</div>
      <table>
        <thead><tr>
          <th style="text-align:left;">Team</th>
          <th>Style</th><th>Def Quality</th><th>EPA/Play</th><th>Sack%</th><th>TO Rate</th><th>3rd Stop%</th>
        </tr></thead>
        <tbody>${defSort.map(t=>`<tr>
          <td>${teamLogo(t.team,20)} ${t.team}</td>
          <td><span class="badge b-blue" style="color:var(--blue);border-color:#4a9ef040;background:#4a9ef00d;">${t.defense_label||'—'}</span></td>
          <td><div class="score-bar"><div class="mini-bar"><div class="mini-fill" style="width:${t.def_quality_score||50}%;background:var(--blue);"></div></div><span style="font-family:'DM Mono',monospace;color:var(--blue);">${fmt(t.def_quality_score)}</span></div></td>
          <td style="font-family:'DM Mono',monospace;color:${(t.def_epa_per_play||0)>0?'var(--green)':'var(--red)'};">${t.def_epa_per_play!=null?(t.def_epa_per_play>0?'+':'')+fmt(t.def_epa_per_play,3):'—'}</td>
          <td style="font-family:'DM Mono',monospace;">${t.sack_rate!=null?fmtPct(t.sack_rate):'—'}</td>
          <td style="font-family:'DM Mono',monospace;">${t.turnover_rate!=null?fmtPct(t.turnover_rate):'—'}</td>
          <td style="font-family:'DM Mono',monospace;">${t.third_down_stop_rate!=null?fmtPct(t.third_down_stop_rate):'—'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

// ── BACKTEST ───────────────────────────────────────────────────
async function loadBacktest() {
  show('bt-loading'); hide('bt-content');
  try {
    const data = await fetch(`${API}/api/backtest?season=${state.season}`).then(r=>r.json());
    if (data.error) { showError('bt-loading', data.error); return; }
    renderBacktest(data);
    show('bt-content'); hide('bt-loading');
  } catch(e) {
    showError('bt-loading', 'No backtest data. Run: python backtest.py --season 2024');
  }
}

function renderBacktest(d) {
  document.getElementById('bt-metrics').innerHTML = [
    {val: fmtPct(d.winner_acc), lbl: 'Winner Accuracy', sub: `${Math.round(d.winner_acc*d.games)}/${d.games} games`},
    {val: d.spread_mae?.toFixed(1)+'pts', lbl: 'Spread MAE', sub: `Bias: ${d.spread_bias>0?'+':''}${d.spread_bias?.toFixed(1)}pts`},
    {val: d.total_mae?.toFixed(1)+'pts', lbl: 'Total MAE', sub: `Bias: ${d.total_bias>0?'+':''}${d.total_bias?.toFixed(1)}pts`},
    {val: d.ats_acc ? fmtPct(d.ats_acc) : '—', lbl: 'ATS Accuracy', sub: 'vs Vegas spread'},
  ].map(m=>`<div class="card"><div class="card-body" style="text-align:center;">
    <div class="metric-big">${m.val}</div>
    <div class="metric-sub">${m.lbl}</div>
    <div style="font-size:10px;color:var(--text3);margin-top:2px;">${m.sub}</div>
  </div></div>`).join('');

  const byWeek = d.by_week || [];
  const maxAcc = Math.max(...byWeek.map(w=>w.acc||0), 0.01);
  const bars = document.getElementById('bt-bars');
  const lbls = document.getElementById('bt-labels');
  bars.innerHTML = byWeek.map(w => {
    const h = Math.round((w.acc/maxAcc)*100);
    const color = w.acc >= 0.65 ? 'var(--green)' : w.acc >= 0.5 ? 'var(--gold)' : 'var(--red)';
    return `<div class="week-bar" style="height:${h}%;background:${color};border-radius:2px 2px 0 0;"
      data-tip="Wk${w.week}: ${fmtPct(w.acc)} (${w.games}g)" title="Wk${w.week}: ${fmtPct(w.acc)}"></div>`;
  }).join('');
  lbls.innerHTML = byWeek.map(w=>`<span>W${w.week}</span>`).join('');
}

// ── PAGE ROUTING ───────────────────────────────────────────────
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if (id === 'players' && !document.getElementById('players-table').innerHTML) loadPlayers(state.pos);
  if (id === 'styles')   loadStyles();
  if (id === 'backtest') loadBacktest();
}

function show(id) { const el=document.getElementById(id); if(el) el.style.display=''; }
function hide(id) { const el=document.getElementById(id); if(el) el.style.display='none'; }
function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.innerHTML = `<div class="empty">${msg}</div>`; el.style.display=''; }
}

init();
</script>
